title: 快讯：沃尔玛宣布就出售西友达成协议

<div class="article-body">
                    <p>【共同社11月16日电】美国零售业巨头沃尔玛16日宣布，已就把旗下日本超市巨头西友（东京）过半数股份出售给美国投资基金KKR达成协议，乐天也将参与出资。入股比例将分别为KKR取得65%，乐天20%，沃尔玛将继续持有15%股份。（完）</p>
