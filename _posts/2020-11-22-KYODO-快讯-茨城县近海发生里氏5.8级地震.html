<div class="article-body">
                    <p>【共同社11月22日电】日本气象厅发布消息称，22日晚7点06分左右，茨城县近海发生推测为里氏5.8级的地震，震源深度约40公里。该县北部观测到震度5弱（日本标准）的摇晃。（完）</p>
