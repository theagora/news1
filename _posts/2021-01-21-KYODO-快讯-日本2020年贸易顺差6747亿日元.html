<div class="article-body">
                    <p>【共同社1月21日电】日本财务省21日公布的2020年贸易统计初值（以通关为准）显示，出口减去进口的贸易收支为顺差6747亿日元（约合人民币421亿元），时隔两年转为顺差。（完）</p>
