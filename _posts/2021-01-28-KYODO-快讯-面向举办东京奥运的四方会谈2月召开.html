                    <p>【共同社1月28日电】东京奥组委主席森喜朗28日与国际奥委会（IOC）主席巴赫举行视频会谈，透露称两人同意面向举办奥运，在2月召开包括日本奥运相桥本圣子、东京都知事小池百合子在内的四方会谈。（完）</p>
