<div class="article-body">
                    <p>【共同社1月28日电】日本八大车商28日发布的2020年全球销量为23,485,786辆，较上年减少15.9%。新冠疫情蔓延导致的经济活动停滞产生了影响，八大车商的销量均少于上年。（完）</p>
