title: 快讯：日政府设想对拒绝住院的新冠患者处以刑罚
date: 2021-01-13 16:05:56.000000000 +08:00
categories: kyodo
---

<div class="article-body">
                    <p>【共同社1月13日电】日本政府13日在与朝野政党商讨新冠疫情对策的联络磋商会上说明称，通过修改《感染症法》，设想对拒绝住院的感染者处以一年以下徒刑或100万日元（约合人民币6.2万元）以下罚款。（完）</p>
