                    <p>【共同社11月19日电】日本东京都知事小池百合子19日宣布，把有关新型冠状病毒疫情的4个级别警惕指标上调1级至最高。警惕级别自9月10日下调以来，时隔约2个月再次升至最高。（完）</p>
