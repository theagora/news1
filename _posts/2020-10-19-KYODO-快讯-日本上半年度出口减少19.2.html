<div class="article-body">
                    <p>【共同社10月19日电】日本财务省19日公布的贸易统计初值（以通关为准）显示，2020上半年度（4至9月）出口比上年同期减少19.2%至30.9114万亿日元（约合人民币2万亿元）。（完）</p>
